            { section: "第八課 咪咪歷險記", text: "牠又看見有幾隻公雞，在曬穀場上喫着穀粒，好奇的咪咪也想去和公雞玩玩，喫喫牠們的穀粒。牠隨手抓了一些穀粒起來喫，穀粒可真硬，咬了半天咬不動，嘴巴上卻沾滿了好些榖粒，像長了鬍鬚一樣。", scene: 'farm_rooster' },
            { section: "第八課 咪咪歷險記", text: "牠用前爪抹了抹嘴巴，繼續往前走。咪咪走到一家農舍旁邊，看見一窩豬兒在泥中打滾。牠看豬兒翻滾的樣子，挺有趣的。咪咪想，我也進去玩一會罷，於是咪咪走進豬圈裏，想和豬兒們玩一會。", scene: 'mud_approaching' },
            { section: "第八課 咪咪歷險記", text: "豬兒們卻說，『貓咪，走開，這兒不是你的家，你的毛會弄的。』咪咪卻不想離開，仍舊往裏面走。沒想到一腳踩到一灘泥水，濺得牠滿身都是。這下咪咪只好甩甩身體，不情願的和豬兒們說再見了。", scene: 'mud_splashed' },
            { section: "第八課 咪咪歷險記", text: "那附在牠身上的泥，卻怎麼也甩不下來。咪咪繼續往前走，走進一片樹林。樹林裏有好多動物朋友，小松鼠在地上鑽來鑽去，大口大口的啃着松果；鳥兒們在樹上嘰嘰喳喳的叫個不停，像是正在開鳥族大會呢!", scene: 'forest_walking' },
            { section: "第八課 咪咪歷險記", text: "還有鹿兒和小兔子，牠們看見咪咪，都很和善的歡迎牠：『小花貓，你好。』咪咪覺得十分奇怪，牠明明是隻小白貓，爲甚麼別人都喊牠是小花貓呢？", scene: 'forest_meeting' },
            { section: "第八課 咪咪歷險記", text: "咪咪看見小白兔，就問牠：『白兔哥哥，我明明是小白貓，怎麼大家都說我是小花貓呢？』小白兔說，『 來，我帶你到水邊看看，你是像白貓還是像花貓。』", scene: 'forest_talking' },
            { section: "第八課 咪咪歷險記", text: "小白兔就帶咪咪到一處溪水邊，讓咪咪看看水中的倒影。哇!真的是隻小花貓呢!全身的毛都染上了泥巴，臉也變成了小花臉。咪咪想，這下糟糕了。", scene: 'stream_reflection' },
            { section: "第八課 咪咪歷險記", text: "媽媽一再告訴我們，神創造我們貓兒，是愛清潔的動物，不會自己弄得髒兮兮的。現在我全身都是泥巴，自己又不會清理，回去準要挨罵了。", scene: 'stream_sad' },
            { section: "第八課 咪咪歷險記", text: "咪咪只好對小白兔說，『白兔大哥，對不起，我偷跑出來玩，弄得全身都是泥，現在我得回家去了，不能再玩了。』小白兔說，『對，趕緊回家去，讓媽媽幫你洗把臉，洗個澡。", scene: 'stream_pointing' },
            { section: "第八課 咪咪歷險記", text: "我們小白兔也像你們貓兒一樣，是愛乾淨的動物呢!』咪咪一路跑回家，全身都是泥巴，回到家裏，媽媽早已着急的等在門口。咪咪看見媽媽，不好意思的把頭低下來，話也不敢多說一句。", scene: 'running_home' },
            { section: "第八課 咪咪歷險記", text: "媽媽沒有責備咪咪，只是一邊用舌頭把咪咪身上的毛舔乾淨，臉也弄乾淨，一邊問咪咪究竟去了那些地方。咪咪一五一十的告訴媽媽：牠追了蝴蝶，喫了公雞的穀粒，又進了豬圈，不小心踩到泥裏，把毛給弄髒了。", scene: 'indoor_washing' },
            { section: "第八課 咪咪歷險記", text: "後來在樹林裏，碰見好心的小兔子，牠纔知道一身都髒了。媽媽繼續舔着咪咪，對牠說，『我們不是豬，在泥裏打滾；我們是愛乾淨的貓兒，要學會怎樣把自己弄乾淨，保持身體的清潔。』", scene: 'indoor_teaching' },
            { section: "第八課 咪咪歷險記", text: "於是媽媽教咪咪，怎樣用舌頭舔自己身上的毛，把毛舔乾淨。又怎樣用前腳的爪子，把臉擦乾淨。當咪咪把自己洗乾淨了，媽媽又帶著咪咪禱告：", scene: 'indoor_self_wash' },
            { section: "第八課 咪咪歷險記", text: "『主阿!赦免我沒有聽媽媽的話，偷跑出去，把自己弄髒了。求你幫助我，作個乾淨清潔，討你喜歡的乖孩子。』咪咪學會了怎樣洗臉和清潔身體，成爲一隻乾淨的小白貓。", scene: 'indoor_praying' },
            { section: "第八課 咪咪歷險記", text: "牠不再去豬圈裏打滾，也不再把自己弄得髒兮兮了，牠喜歡作隻清潔乾淨的小白貓，爲討神喜歡。小朋友，神喜歡我們是個清潔的孩子。因祂造我們的時候，原是清潔可愛的。我們要常常保持清潔，討神的喜歡。", scene: 'garden_clean' },
            { section: "故事重點", text: "(一) 從小貓咪咪溜出去玩，弄得一身是髒的故事，讓幼兒認識保持身體清潔的重要。(二) 認識神給很多動物有愛乾淨的天性，像貓咪的舌頭上長了很多小刺，能像刷子一樣，把身上的灰塵舔掉。", scene: 'icon_lightbulb' },
            { section: "故事重點", text: "舌頭舔不到的地方，像頭和脖子後面，貓咪會把口水抹在腳，再用前腳來擦。(三) 很多動物都有清潔的習性，人是照着神的形像造的，更當操練清潔，好彰顯神。", scene: 'icon_lightbulb' },
            { section: "問題討論", text: "(一) 咪咪的毛是甚麼顏色的？\n(二) 咪咪的媽媽怎樣幫咪咪洗澡？\n(三) 咪咪追蝴蝶追累了，就躺在地上休息，你想牠的毛會不會髒掉？\n(四) 森林裏的動物爲甚麼把咪咪看成是一隻小花貓？", scene: 'icon_question' },
            { section: "問題討論", text: "(五) 我們如何保持身體的清潔？\n(洗手、洗臉、刷牙、洗澡、穿整齊清潔的衣服。)", scene: 'icon_question' },
            { section: "常規訓練", text: "我會自己穿脫、摺疊衣服。\n豫備材料：各種不同的衣服，可按季節分春、夏、秋、冬，以及按用途分内衣、外衣、睡衣等。衣服可以稍大些，便於幼兒直接套上去。", scene: 'icon_clothes' },
            { section: "常規訓練", text: "(一) 老師示範穿、脫衣服的方法，特別注意衣領翻好，衣擺放進褲子裏。\n(二) 請小朋友排隊選擇自己喜歡的衣服穿上後，站成一排，老師檢查看是否穿戴整齊宜。", scene: 'icon_clothes' },
            { section: "常規訓練", text: "(三) 請小朋友自己脫下剛纔穿上的衣服，老師示範並教導幼兒自己摺疊、掛衣服。", scene: 'icon_clothes' },
            { section: "活動", text: "清潔寶寶人人愛。\n(一) 老師告訴小朋友，作個清潔寶寶，人人都喜愛。常常洗手、洗臉、刷牙，天天洗澡，換乾淨的衣服；並介紹各種衣服，在甚麼時候、甚麼場合穿。", scene: 'icon_soap' },
            { section: "活動", text: "(二) 由小朋友分別扮演一家人，(爸、媽、兄弟姊妹，)從起牀到睡覺，作了那些和清潔有關的事。(早晨刷牙、洗臉、穿衣，喫飯前後洗手，晚上洗澡、刷牙、換睡衣等。)", scene: 'icon_soap' },
            { section: "生活操練", text: "會每天洗澡，也會自己穿脫、摺疊衣服，並保持衣服的整齊清潔。", scene: 'icon_star' }
        ];

        let currentPage = 0;
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const cw = canvas.width;
        const ch = canvas.height;

        // ==========================================
        // 核心繪圖引擎與形狀函式庫 (大幅擴充細節)
        // ==========================================

        // 畫漸層背景
        function drawGradient(c1, c2, y1, y2) {
            let grad = ctx.createLinearGradient(0, y1, 0, y2);
            grad.addColorStop(0, c1);
            grad.addColorStop(1, c2);
            ctx.fillStyle = grad;
            ctx.fillRect(0, y1, cw, y2 - y1);
        }

        // 畫太陽與雲朵
        function drawSkyDetails(isDusk = false) {
            ctx.fillStyle = isDusk ? '#ff7f50' : '#f1c40f'; // 太陽顏色
            ctx.beginPath();
            ctx.arc(cw - 120, 80, 50, 0, Math.PI * 2);
            ctx.fill();

            // 雲朵
            ctx.fillStyle = isDusk ? '#ffb8b8' : '#ffffff';
            const drawCloud = (cx, cy, s) => {
                ctx.save(); ctx.translate(cx, cy); ctx.scale(s, s);
                ctx.beginPath(); ctx.arc(0, 0, 30, 0, Math.PI*2);
                ctx.arc(40, -10, 40, 0, Math.PI*2); ctx.arc(80, 0, 30, 0, Math.PI*2);
                ctx.fill(); ctx.restore();
            };
            drawCloud(100, 60, 1);
            drawCloud(cw/2, 40, 0.8);
            drawCloud(cw - 300, 90, 1.2);
        }

        // 畫樹木 (更精細)
        function drawTree(x, y, scale) {
            ctx.save();
            ctx.translate(x, y);
            ctx.scale(scale, scale);
            // 樹幹
            ctx.fillStyle = '#6ab04c'; // 陰影
            ctx.fillRect(-20, 0, 40, 150);
            ctx.fillStyle = '#535c68'; // 樹皮
            ctx.fillRect(-15, 0, 30, 150);
            
            // 樹冠 (多層次圓形)
            ctx.fillStyle = '#218c74';
            ctx.beginPath(); ctx.arc(0, -60, 80, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#26ae60';
            ctx.beginPath(); ctx.arc(-40, -20, 70, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(40, -20, 70, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#2ecc71';
            ctx.beginPath(); ctx.arc(0, -10, 60, 0, Math.PI*2); ctx.fill();
            ctx.restore();
        }

        // 畫室內背景 (窗戶、木地板、地毯)
        function drawIndoor() {
            drawGradient('#fae1dd', '#ffeaa7', 0, ch * 0.55); // 牆壁
            
            // 窗戶
            ctx.fillStyle = '#ffffff'; ctx.fillRect(100, 40, 180, 150);
            ctx.fillStyle = '#74b9ff'; ctx.fillRect(110, 50, 75, 65); ctx.fillRect(195, 50, 75, 65);
            ctx.fillRect(110, 120, 75, 60); ctx.fillRect(195, 120, 75, 60);
            
            // 木地板
            drawGradient('#e17055', '#d63031', ch * 0.55, ch);
            ctx.strokeStyle = '#b2bec3'; ctx.lineWidth = 2;
            for(let i=0; i<cw; i+=60) {
                ctx.beginPath(); ctx.moveTo(i, ch*0.55); ctx.lineTo(i - 100, ch); ctx.stroke();
            }

            // 圓形地毯
            ctx.fillStyle = '#fdcb6e';
            ctx.beginPath(); ctx.ellipse(cw/2, ch*0.75, 250, 60, 0, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = '#e1b12c'; ctx.lineWidth = 5; ctx.stroke();
        }

        // 畫貓咪 (支援多種姿態、臉部細節、髒污狀態)
        function drawCat(x, y, scale, pose, isDirty = false, color = '#ffffff') {
            ctx.save();
            ctx.translate(x, y);
            ctx.scale(scale, scale);

            // 陰影
            ctx.fillStyle = 'rgba(0,0,0,0.15)';
            ctx.beginPath(); ctx.ellipse(0, 45, 50, 10, 0, 0, Math.PI*2); ctx.fill();

            // 顏色設定
            const catColor = color;
            const darkColor = (color === '#ffffff') ? '#dfe6e9' : '#5d4037'; // 邊緣陰影
            
            ctx.fillStyle = catColor;
            ctx.strokeStyle = darkColor;
            ctx.lineWidth = 2;

            if (pose === 'curl') {
                // 蜷縮睡覺的球狀
                ctx.beginPath(); ctx.arc(0, 20, 35, 0, Math.PI*2); ctx.fill(); ctx.stroke();
                // 閉眼
                ctx.strokeStyle = '#2d3436'; ctx.beginPath(); ctx.arc(-10, 15, 5, Math.PI, Math.PI*2); ctx.stroke();
            } 
            else if (pose === 'sit' || pose === 'pray' || pose === 'wash') {
                // 坐姿
                // 尾巴
                ctx.strokeStyle = catColor; ctx.lineWidth = 12; ctx.lineCap = 'round';
                ctx.beginPath(); ctx.moveTo(25, 30); ctx.quadraticCurveTo(60, 30, 50, -10); ctx.stroke();
                // 身體
                ctx.fillStyle = catColor;
                ctx.beginPath(); ctx.ellipse(0, 20, 30, 40, 0, 0, Math.PI*2); ctx.fill();
                // 前腳
                if (pose === 'pray') {
                    ctx.beginPath(); ctx.arc(0, 10, 8, 0, Math.PI*2); ctx.fill(); // 祈禱手
                } else if (pose === 'wash') {
                    ctx.beginPath(); ctx.arc(-15, 0, 10, 0, Math.PI*2); ctx.fill(); // 洗臉手
                } else {
                    ctx.beginPath(); ctx.arc(-10, 50, 8, 0, Math.PI*2); ctx.arc(10, 50, 8, 0, Math.PI*2); ctx.fill();
                }
                drawCatHead(0, -20, pose, isDirty);
            }
            else { // walk / stand
                // 尾巴
                ctx.strokeStyle = catColor; ctx.lineWidth = 12; ctx.lineCap = 'round';
                ctx.beginPath(); ctx.moveTo(35, 10); ctx.quadraticCurveTo(60, -30, 70, -10); ctx.stroke();
                // 身體
                ctx.fillStyle = catColor;
                ctx.beginPath(); ctx.ellipse(0, 20, 45, 25, 0, 0, Math.PI*2); ctx.fill();
                // 腳
                ctx.beginPath(); ctx.arc(-25, 45, 8, 0, Math.PI*2); ctx.arc(-10, 45, 8, 0, Math.PI*2);
                ctx.arc(15, 45, 8, 0, Math.PI*2); ctx.arc(30, 45, 8, 0, Math.PI*2); ctx.fill();
                drawCatHead(-35, 0, pose, isDirty);
            }

            // 髒污特效 (泥巴斑點)
            if (isDirty) {
                ctx.fillStyle = '#8d6e63';
                const spots = [[0, 20, 8], [15, 10, 6], [-10, 30, 7], [-20, 15, 5], [5, 35, 4]];
                spots.forEach(s => {
                    ctx.beginPath(); ctx.arc(s[0], s[1], s[2], 0, Math.PI*2); ctx.fill();
                });
            }

            ctx.restore();
        }

        // 貓咪頭部細節
        function drawCatHead(hx, hy, pose, isDirty) {
            ctx.save(); ctx.translate(hx, hy);
            ctx.fillStyle = '#ffffff';
            // 臉
            ctx.beginPath(); ctx.arc(0, 0, 28, 0, Math.PI*2); ctx.fill();
            // 耳朵
            ctx.beginPath(); ctx.moveTo(-20, -15); ctx.lineTo(-25, -40); ctx.lineTo(-5, -25); ctx.fill();
            ctx.beginPath(); ctx.moveTo(20, -15); ctx.lineTo(25, -40); ctx.lineTo(5, -25); ctx.fill();
            ctx.fillStyle = '#ffb8b8'; // 內耳
            ctx.beginPath(); ctx.moveTo(-15, -20); ctx.lineTo(-20, -35); ctx.lineTo(-8, -25); ctx.fill();
            ctx.beginPath(); ctx.moveTo(15, -20); ctx.lineTo(20, -35); ctx.lineTo(8, -25); ctx.fill();
            
            // 五官
            ctx.fillStyle = '#2d3436';
            if (pose === 'pray' || pose === 'sad') {
                // 閉眼/悲傷
                ctx.beginPath(); ctx.arc(-10, -5, 5, Math.PI, Math.PI*2); ctx.stroke();
                ctx.beginPath(); ctx.arc(10, -5, 5, Math.PI, Math.PI*2); ctx.stroke();
            } else {
                // 睜眼
                ctx.beginPath(); ctx.arc(-10, -5, 4, 0, Math.PI*2); ctx.arc(10, -5, 4, 0, Math.PI*2); ctx.fill();
            }
            ctx.fillStyle = '#ff7675'; ctx.beginPath(); ctx.arc(0, 5, 3, 0, Math.PI*2); ctx.fill(); // 鼻子
            // 鬍鬚
            ctx.strokeStyle = '#b2bec3'; ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(-15, 5); ctx.lineTo(-35, 0); ctx.moveTo(-15, 10); ctx.lineTo(-35, 15);
            ctx.moveTo(15, 5); ctx.lineTo(35, 0); ctx.moveTo(15, 10); ctx.lineTo(35, 15); ctx.stroke();

            // 臉部髒污或穀粒
            if (isDirty) {
                ctx.fillStyle = '#8d6e63';
                ctx.beginPath(); ctx.arc(-15, 10, 5, 0, Math.PI*2); ctx.arc(12, 12, 4, 0, Math.PI*2); ctx.fill();
            }
            if (pose === 'grain') {
                ctx.fillStyle = '#f1c40f'; // 穀粒
                for(let i=0; i<8; i++) {
                    ctx.fillRect(-20 + Math.random()*40, 5 + Math.random()*15, 3, 3);
                }
            }
            ctx.restore();
        }

        // 畫豬與泥坑
        function drawMudPen() {
            // 泥坑
            ctx.fillStyle = '#5d4037';
            ctx.beginPath(); ctx.ellipse(cw/2 + 100, ch*0.75, 200, 60, 0, 0, Math.PI*2); ctx.fill();
            // 柵欄
            ctx.fillStyle = '#836323';
            for(let i=100; i<cw; i+=80) { ctx.fillRect(i, ch*0.45, 15, 80); }
            ctx.fillRect(80, ch*0.5, cw-100, 15); ctx.fillRect(80, ch*0.6, cw-100, 15);
        }

        function drawPig(x, y, scale, isRolling) {
            ctx.save(); ctx.translate(x, y); ctx.scale(scale, scale);
            ctx.fillStyle = '#ff9ff3';
            if (isRolling) ctx.rotate(Math.PI); // 翻滾
            
            // 身體
            ctx.beginPath(); ctx.ellipse(0, 0, 55, 40, 0, 0, Math.PI*2); ctx.fill();
            // 頭
            ctx.beginPath(); ctx.arc(-45, -10, 30, 0, Math.PI*2); ctx.fill();
            // 鼻子
            ctx.fillStyle = '#f368e0'; ctx.beginPath(); ctx.ellipse(-65, -5, 12, 18, 0, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#222'; ctx.beginPath(); ctx.arc(-68, -10, 2, 0, Math.PI*2); ctx.arc(-68, 0, 2, 0, Math.PI*2); ctx.fill();
            // 眼睛與耳
            ctx.beginPath(); ctx.arc(-50, -20, 3, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#ff9ff3'; ctx.beginPath(); ctx.moveTo(-35, -35); ctx.lineTo(-25, -50); ctx.lineTo(-15, -35); ctx.fill();
            // 泥巴噴濺
            ctx.fillStyle = '#3e2723';
            ctx.beginPath(); ctx.arc(10, 10, 10, 0, Math.PI*2); ctx.arc(-10, 20, 8, 0, Math.PI*2); ctx.arc(30, -10, 12, 0, Math.PI*2); ctx.fill();
            ctx.restore();
        }

        // 畫公雞與曬穀場
        function drawRooster(x, y) {
            ctx.save(); ctx.translate(x, y);
            // 身體
            ctx.fillStyle = '#e67e22'; ctx.beginPath(); ctx.arc(0, 0, 40, 0, Math.PI*2); ctx.fill();
            // 尾巴
            ctx.fillStyle = '#2c3e50'; ctx.beginPath(); ctx.moveTo(30, -10); ctx.lineTo(70, -60); ctx.lineTo(40, 10); ctx.fill();
            ctx.fillStyle = '#16a085'; ctx.beginPath(); ctx.moveTo(35, 0); ctx.lineTo(80, -30); ctx.lineTo(40, 20); ctx.fill();
            // 頭與脖子
            ctx.fillStyle = '#f1c40f'; ctx.beginPath(); ctx.moveTo(-20, -20); ctx.lineTo(-40, -60); ctx.lineTo(-10, -30); ctx.fill();
            ctx.beginPath(); ctx.arc(-35, -60, 18, 0, Math.PI*2); ctx.fill();
            // 雞冠與嘴
            ctx.fillStyle = '#e74c3c';
            ctx.beginPath(); ctx.arc(-35, -80, 8, 0, Math.PI*2); ctx.arc(-25, -75, 8, 0, Math.PI*2); ctx.arc(-45, -75, 8, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#d35400'; ctx.beginPath(); ctx.moveTo(-50, -60); ctx.lineTo(-65, -55); ctx.lineTo(-50, -50); ctx.fill();
            // 眼睛
            ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(-35, -62, 3, 0, Math.PI*2); ctx.fill();
            ctx.restore();
        }

        // 畫兔子
        function drawRabbit(x, y) {
            ctx.save(); ctx.translate(x, y);
            ctx.fillStyle = '#ffffff';
            ctx.beginPath(); ctx.ellipse(0, 20, 35, 25, 0, 0, Math.PI*2); ctx.fill(); // 身體
            ctx.beginPath(); ctx.arc(-25, -5, 22, 0, Math.PI*2); ctx.fill(); // 頭
            ctx.beginPath(); ctx.ellipse(-30, -40, 8, 30, -Math.PI/8, 0, Math.PI*2); ctx.fill(); // 耳
            ctx.ellipse(-15, -40, 8, 30, Math.PI/8, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#ffb8b8'; ctx.beginPath(); ctx.arc(-30, -5, 4, 0, Math.PI*2); ctx.fill(); // 眼
            ctx.restore();
        }

        // 畫蝴蝶
        function drawButterfly(x, y, scale, color) {
            ctx.save(); ctx.translate(x, y); ctx.scale(scale, scale);
            ctx.fillStyle = color;
            ctx.beginPath(); ctx.ellipse(-15, -15, 20, 15, Math.PI/4, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(15, -15, 20, 15, -Math.PI/4, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(-12, 12, 15, 12, -Math.PI/4, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(12, 12, 15, 12, Math.PI/4, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#2d3436'; ctx.fillRect(-3, -20, 6, 40); // 身體
            ctx.restore();
        }

        // 繪製高質感圖示 (針對教學與重點頁面)
        function drawIconScene(type) {
            drawGradient('#f1f2f6', '#dfe4ea', 0, ch);
            ctx.save(); ctx.translate(cw/2, ch/2);
            
            // 光暈背景
            let g = ctx.createRadialGradient(0,0,10, 0,0,150);
            g.addColorStop(0, '#ffffff'); g.addColorStop(1, 'rgba(255,255,255,0)');
            ctx.fillStyle = g; ctx.beginPath(); ctx.arc(0,0,150,0,Math.PI*2); ctx.fill();

            ctx.shadowColor = 'rgba(0,0,0,0.2)'; ctx.shadowBlur = 15; ctx.shadowOffsetY = 10;
            
            if (type === 'bible') {
                // 畫聖經與十字架
                ctx.fillStyle = '#8b4513'; ctx.fillRect(-80, -60, 160, 120); // 書皮
                ctx.fillStyle = '#f1f2f6'; ctx.fillRect(-70, -50, 65, 100); ctx.fillRect(5, -50, 65, 100); // 內頁
                ctx.fillStyle = '#d4af37'; ctx.fillRect(-10, -30, 20, 60); ctx.fillRect(-25, -10, 50, 20); // 十字架
            } else if (type === 'icon_lightbulb') {
                // 畫燈泡
                ctx.fillStyle = '#f1c40f'; ctx.beginPath(); ctx.arc(0, -30, 50, 0, Math.PI*2); ctx.fill();
                ctx.fillRect(-25, 0, 50, 40);
                ctx.fillStyle = '#95a5a6'; ctx.fillRect(-20, 40, 40, 20); ctx.beginPath(); ctx.arc(0, 65, 15, 0, Math.PI*2); ctx.fill();
                ctx.strokeStyle = '#f39c12'; ctx.lineWidth = 4;
                for(let i=0; i<5; i++) {
                    let a = Math.PI + (i * Math.PI/4);
                    ctx.beginPath(); ctx.moveTo(Math.cos(a)*60, -30+Math.sin(a)*60); ctx.lineTo(Math.cos(a)*90, -30+Math.sin(a)*90); ctx.stroke();
                }
            } else if (type === 'icon_question') {
                // 畫大問號
                ctx.fillStyle = '#3498db'; ctx.font = 'bold 160px Arial';
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('?', 0, 10);
            } else if (type === 'icon_clothes') {
                // 畫衣服
                ctx.fillStyle = '#ff6b81';
                ctx.beginPath(); ctx.moveTo(-40, -60); ctx.lineTo(40, -60); ctx.lineTo(80, -20); ctx.lineTo(50, 0);
                ctx.lineTo(40, -20); ctx.lineTo(40, 60); ctx.lineTo(-40, 60); ctx.lineTo(-40, -20);
                ctx.lineTo(-50, 0); ctx.lineTo(-80, -20); ctx.closePath(); ctx.fill();
                ctx.fillStyle = '#ffffff'; ctx.beginPath(); ctx.arc(0, -60, 20, 0, Math.PI*2); ctx.fill(); // 領口
            } else if (type === 'icon_soap') {
                // 畫肥皂與泡泡
                ctx.fillStyle = '#7bed9f'; ctx.beginPath(); ctx.ellipse(0, 20, 70, 40, -Math.PI/12, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#2ed573'; ctx.beginPath(); ctx.ellipse(0, 20, 50, 20, -Math.PI/12, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = 'rgba(255,255,255,0.7)';
                ctx.beginPath(); ctx.arc(-50, -30, 20, 0, Math.PI*2); ctx.arc(30, -40, 25, 0, Math.PI*2);
                ctx.arc(-10, -60, 15, 0, Math.PI*2); ctx.arc(60, 0, 15, 0, Math.PI*2); ctx.fill();
            } else if (type === 'icon_star') {
                // 畫星星
                ctx.fillStyle = '#feca57';
                ctx.beginPath();
                for(let i=0; i<5; i++) {
                    ctx.lineTo(Math.cos((18+i*72)*Math.PI/180)*80, -Math.sin((18+i*72)*Math.PI/180)*80);
                    ctx.lineTo(Math.cos((54+i*72)*Math.PI/180)*35, -Math.sin((54+i*72)*Math.PI/180)*35);
                }
                ctx.closePath(); ctx.fill();
            }
            ctx.restore();
        }

        // ==========================================
        // 核心場景渲染器：根據標籤組合畫面
        // ==========================================
        function renderScene(scene) {
            ctx.clearRect(0, 0, cw, ch);
            ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;

            if (scene.startsWith('icon') || scene === 'bible') {
                drawIconScene(scene);
                return;
            }

            if (scene.startsWith('indoor')) {
                drawIndoor();
                if (scene === 'indoor_basket') {
                    // 貓籃子與小貓
                    ctx.fillStyle = '#d2691e'; ctx.beginPath(); ctx.ellipse(cw/2, ch*0.7, 120, 50, 0, 0, Math.PI*2); ctx.fill();
                    drawCat(cw/2 - 40, ch*0.65, 0.7, 'curl', false, '#ffffff');
                    drawCat(cw/2, ch*0.68, 0.6, 'curl', false, '#8d6e63');
                    drawCat(cw/2 + 40, ch*0.65, 0.65, 'curl', false, '#f1c40f');
                    drawCat(cw/2 - 120, ch*0.6, 1.4, 'sit', false, '#ffffff'); // 媽媽
                } else if (scene === 'indoor_nursing') {
                    drawCat(cw/2, ch*0.65, 1.5, 'curl', false, '#ffffff'); // 媽媽躺著
                    drawCat(cw/2 - 30, ch*0.75, 0.6, 'curl', false, '#ffffff');
                    drawCat(cw/2 + 20, ch*0.72, 0.6, 'curl', false, '#8d6e63');
                } else if (scene === 'indoor_playing') {
                    drawCat(200, ch*0.7, 1.4, 'sit', false, '#ffffff'); // 媽媽
                    drawCat(400, ch*0.6, 0.8, 'walk', false, '#ffffff'); // 咪咪
                    drawCat(550, ch*0.8, 0.7, 'sit', false, '#8d6e63');
                    // 毛線球
                    ctx.fillStyle = '#e84393'; ctx.beginPath(); ctx.arc(480, ch*0.75, 15, 0, Math.PI*2); ctx.fill();
                } else if (scene === 'indoor_bored') {
                    drawCat(cw/2 - 100, ch*0.7, 1.4, 'sit', false, '#ffffff'); // 媽媽叼貓(意象)
                    drawCat(cw - 200, ch*0.7, 0.9, 'sit', false, '#ffffff'); // 咪咪無聊
                } else if (scene === 'indoor_washing') {
                    drawCat(cw/2 - 80, ch*0.65, 1.5, 'wash', false, '#ffffff'); // 媽媽
                    drawCat(cw/2 + 50, ch*0.75, 0.9, 'sad', true, '#ffffff'); // 髒咪咪
                } else if (scene === 'indoor_teaching') {
                    drawCat(cw/2 - 100, ch*0.65, 1.5, 'wash', false, '#ffffff');
                    drawCat(cw/2 + 50, ch*0.75, 0.9, 'sit', true, '#ffffff');
                } else if (scene === 'indoor_self_wash') {
                    drawCat(cw/2 - 100, ch*0.65, 1.5, 'sit', false, '#ffffff');
                    drawCat(cw/2 + 50, ch*0.75, 0.9, 'wash', false, '#ffffff'); // 洗乾淨了
                } else if (scene === 'indoor_praying') {
                    drawCat(cw/2 - 80, ch*0.65, 1.4, 'pray', false, '#ffffff');
                    drawCat(cw/2 + 60, ch*0.75, 0.9, 'pray', false, '#ffffff');
                    // 神聖光芒
                    ctx.fillStyle = 'rgba(255, 234, 167, 0.3)';
                    ctx.beginPath(); ctx.moveTo(cw/2-50, 0); ctx.lineTo(cw/2+50, 0); ctx.lineTo(cw/2+150, ch); ctx.lineTo(cw/2-150, ch); ctx.fill();
                }
            } 
            else if (scene.startsWith('garden')) {
                drawGradient('#81ecec', '#55efc4', 0, ch); // 天空與草地
                drawSkyDetails();
                // 花朵
                for(let i=0; i<5; i++) {
                    ctx.fillStyle = '#e84393'; ctx.beginPath(); ctx.arc(100+i*150, ch-40, 20, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = '#f1c40f'; ctx.beginPath(); ctx.arc(100+i*150, ch-40, 8, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = '#27ae60'; ctx.fillRect(98+i*150, ch-20, 4, 20);
                }
                if (scene === 'garden_butterfly') {
                    drawCat(cw/2, ch*0.7, 1, 'walk', false, '#ffffff');
                    drawButterfly(cw/2 + 100, 150, 1.2, '#fd79a8');
                    drawButterfly(cw/2 + 200, 100, 0.8, '#a29bfe');
                    drawButterfly(cw/2 - 100, 120, 1, '#ffeaa7');
                } else if (scene === 'garden_clean') {
                    drawCat(cw/2, ch*0.7, 1.2, 'sit', false, '#ffffff'); // 乾淨發光
                    // 閃星星
                    ctx.fillStyle = '#f1c40f';
                    ctx.fillText('✨', cw/2 - 60, ch*0.6); ctx.fillText('✨', cw/2 + 50, ch*0.5);
                }
            }
            else if (scene.startsWith('farm')) {
                drawGradient('#74b9ff', '#fab1a0', 0, ch*0.5); // 天空
                drawGradient('#e1b12c', '#f39c12', ch*0.5, ch); // 曬穀場
                drawSkyDetails();
                
                // 農舍背景
                ctx.fillStyle = '#d35400'; ctx.fillRect(cw-250, ch*0.2, 200, ch*0.3);
                ctx.fillStyle = '#c0392b'; ctx.beginPath(); ctx.moveTo(cw-270, ch*0.2); ctx.lineTo(cw-150, ch*0.05); ctx.lineTo(cw-30, ch*0.2); ctx.fill();

                if (scene === 'farm_rooster') {
                    // 地上穀粒
                    ctx.fillStyle = '#f1c40f';
                    for(let i=0; i<30; i++) { ctx.beginPath(); ctx.arc(100+Math.random()*cw*0.5, ch*0.6+Math.random()*100, 3, 0, Math.PI*2); ctx.fill(); }
                    drawRooster(cw/2 + 100, ch*0.7);
                    drawCat(200, ch*0.75, 1, 'grain', false, '#ffffff'); // 嘴巴沾穀粒
                }
            }
            else if (scene.startsWith('mud')) {
                drawGradient('#b2bec3', '#74b9ff', 0, ch*0.5);
                drawGradient('#a4b0be', '#8d6e63', ch*0.5, ch);
                drawMudPen();
                if (scene === 'mud_approaching') {
                    drawPig(cw/2, ch*0.7, 1, false); drawPig(cw/2 + 150, ch*0.75, 0.9, true);
                    drawCat(150, ch*0.8, 1, 'walk', false, '#ffffff'); // 還沒髒
                } else if (scene === 'mud_splashed') {
                    drawPig(cw/2, ch*0.7, 1, false); drawPig(cw/2 + 150, ch*0.75, 0.9, true);
                    drawCat(250, ch*0.8, 1, 'sad', true, '#ffffff'); // 變髒了
                }
            }
            else if (scene.startsWith('forest')) {
                drawGradient('#a29bfe', '#55efc4', 0, ch);
                drawTree(150, ch*0.6, 1.2); drawTree(cw/2, ch*0.5, 0.8); drawTree(cw-150, ch*0.6, 1.5);
                
                if (scene === 'forest_walking') {
                    drawCat(cw/2, ch*0.8, 1, 'walk', true, '#ffffff');
                    // 松鼠
                    ctx.fillStyle = '#d35400'; ctx.beginPath(); ctx.arc(200, ch*0.8, 15, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.ellipse(180, ch*0.8, 20, 10, -Math.PI/4, 0, Math.PI*2); ctx.fill(); // 尾巴
                } else if (scene === 'forest_meeting' || scene === 'forest_talking') {
                    drawCat(cw/2 - 100, ch*0.8, 1, 'sit', true, '#ffffff');
                    drawRabbit(cw/2 + 150, ch*0.8);
                }
            }
            else if (scene.startsWith('stream')) {
                drawGradient('#74b9ff', '#55efc4', 0, ch*0.6);
                drawGradient('#0984e3', '#74b9ff', ch*0.6, ch); // 溪水
                
                // 水波紋
                ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth = 2;
                for(let i=0; i<5; i++) {
                    ctx.beginPath(); ctx.moveTo(100+i*50, ch*0.7+i*20); ctx.quadraticCurveTo(150+i*50, ch*0.7+i*20-10, 200+i*50, ch*0.7+i*20); ctx.stroke();
                }

                if (scene === 'stream_reflection') {
                    drawCat(cw/2 - 100, ch*0.55, 1, 'walk', true, '#ffffff');
                    // 倒影
                    ctx.save(); ctx.translate(cw/2 - 100, ch*0.65); ctx.scale(1, -0.6);
                    ctx.globalAlpha = 0.3; drawCatHead(0, 0, 'sad', true); ctx.restore();
                    drawRabbit(cw/2 + 150, ch*0.55);
                } else if (scene === 'stream_sad' || scene === 'stream_pointing') {
                    drawCat(cw/2 - 100, ch*0.55, 1, 'sad', true, '#ffffff');
                    drawRabbit(cw/2 + 150, ch*0.55);
                }
            }
            else if (scene === 'running_home') {
                drawGradient('#2c3e50', '#e67e22', 0, ch*0.6); // 黃昏
                drawSkyDetails(true);
                drawGradient('#27ae60', '#2ecc71', ch*0.6, ch);
                // 遠處房子
                ctx.fillStyle = '#34495e'; ctx.fillRect(100, ch*0.4, 100, ch*0.2);
                ctx.fillStyle = '#c0392b'; ctx.beginPath(); ctx.moveTo(90, ch*0.4); ctx.lineTo(150, ch*0.3); ctx.lineTo(210, ch*0.4); ctx.fill();
                drawCat(cw - 200, ch*0.75, 1.2, 'walk', true, '#ffffff'); // 跑回家
            }
        }

        // ==========================================
        // 翻頁控制與下載邏輯
        // ==========================================
        function renderPage() {
            const data = storyData[currentPage];
            
            document.getElementById("sectionTitle").innerText = data.section;
            document.getElementById("pageContent").innerText = data.text;
            document.getElementById("pageIndicator").innerText = `${currentPage + 1} / ${storyData.length}`;
            
            document.getElementById("prevBtn").disabled = currentPage === 0;
            document.getElementById("nextBtn").disabled = currentPage === storyData.length - 1;

            renderScene(data.scene);
        }

        function nextPage() {
            if (currentPage < storyData.length - 1) {
                currentPage++;
                renderPage();
            }
        }

        function prevPage() {
            if (currentPage > 0) {
                currentPage--;
                renderPage();
            }
        }

        // 儲存 HTML 檔案的功能
        function downloadHTML() {
            // 取得當前的完整 HTML 文件內容
            let htmlContent = document.documentElement.outerHTML;
            // 確保檔案開頭帶有標準 DOCTYPE 宣告
            htmlContent = "<!DOCTYPE html>\n" + htmlContent;
            
            // 建立 Blob 物件將字串轉為檔案
            const blob = new Blob([htmlContent], { type: 'text/html;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            
            // 建立一個隱藏的超連結並觸發下載
            const a = document.createElement('a');
            a.href = url;
            a.download = '咪咪歷險記_互動繪本.html';
            document.body.appendChild(a);
            a.click();
            
            // 清理釋放記憶體
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // 啟動應用
        window.onload = () => {
            renderPage();
        };
    </script>

</body></html>
